
  services:
    mysql:
      image: mysql:5.7
      container_name: database
      environment:
        MYSQL_ROOT_PASSWORD: "abcd1234"
      ports:
        - "3306:3306"
      healthcheck:
        test: ["CMD", "mysqladmin", "ping", "-h", "mysql"]
        interval: 10s
        timeout: 5s
        retries: 5
        start_period: 20s
       
     

    backend:
      build:
        context: ./backend
        dockerfile: Dockerfile
      container_name: node
      ports:
        - "5000:5000"
      volumes:
        - ./backend:/usr/src/app
      depends_on:
        mysql:
          condition: service_started
      environment:
        DB_HOST: mysql
        DB_PORT: 3306
        DB_USER: root
        DB_PASSWORD: "abcd1234"
      restart: on-failure 
      stdin_open: true
      tty: true 

    frontend:
      build:
        context: ./frontend
        dockerfile : Dockerfile
      container_name: react
      ports:
        - "3000:3000"
      volumes:
        - ./frontend:/app
      depends_on:
        backend:
          condition: service_started
      stdin_open: true
      tty: true
